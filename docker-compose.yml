services:
  postgres:
    image: postgres:16-alpine
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${PG_USER}", "-d", "${PG_DB}"]
      interval: 5s
      retries: 5

  airflow-init:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PG_USER}:${PG_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    entrypoint: >
      /bin/bash -c "
        airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@gmail.com \
      "

  airflow-webserver:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PG_USER}:${PG_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      PYTHONDONTWRITEBYTECODE: "1"
      PG_HOST: postgres
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ingestion:/opt/airflow/ingestion
      - ./transformation:/opt/airflow/transformation
      - ./.env:/opt/airflow/.env
      - ./config:/opt/airflow/config
      - ./analytics:/opt/airflow/analytics
    ports:
      - "8080:8080"
    command: webserver

  airflow-scheduler:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${PG_USER}:${PG_PASSWORD}@postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      PYTHONDONTWRITEBYTECODE: "1"
      PG_HOST: postgres
    volumes:
      - ./dags:/opt/airflow/dags
      - ./ingestion:/opt/airflow/ingestion
      - ./transformation:/opt/airflow/transformation
      - ./.env:/opt/airflow/.env
      - ./config:/opt/airflow/config
      - ./analytics:/opt/airflow/analytics
    command: scheduler

  db-init:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PG_HOST: postgres
    volumes:
      - ./scripts:/opt/airflow/scripts
      - ./ingestion:/opt/airflow/ingestion
      - ./.env:/opt/airflow/.env
      - ./config:/opt/airflow/config
    working_dir: /opt/airflow
    command: python scripts/init_db.py
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PG_HOST: postgres
      PYTHONPATH: /opt/api
    volumes:
      - ./api:/opt/api
      - ./dashboard:/opt/api/dashboard
      - ./ingestion:/opt/ingestion
      - ./transformation:/opt/transformation
      - ./analytics:/opt/analytics
      - ./.env:/opt/api/.env
      - ./config:/opt/api/config
    ports:
      - "8000:8000"
    working_dir: /opt/api/api
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  postgres_data: